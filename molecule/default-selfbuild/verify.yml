---
- name: Verify Healthchecks systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Healthchecks service to become active (up to 180s)
      ansible.builtin.systemd:
        name: healthchecks.service
      register: healthchecks_service
      until: healthchecks_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Healthchecks service is active
      ansible.builtin.assert:
        that: healthchecks_service.status.ActiveState == 'active'
        fail_msg: "healthchecks.service not active ({{ healthchecks_service.status.ActiveState }})"
        success_msg: "healthchecks.service is active"

    - name: Retrieve Healthchecks service log for debugging
      when: healthchecks_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu healthchecks.service
      changed_when: false

    - name: Wait for Healthchecks HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:8000/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: healthchecks_endpoint
      until: healthchecks_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Healthchecks HTTP endpoint responds
      ansible.builtin.assert:
        that: healthchecks_endpoint.status in [200, 302]
        fail_msg: "Healthchecks did not respond as expected ({{ healthchecks_endpoint.status | default('no response') }})"
        success_msg: "Healthchecks responded with {{ healthchecks_endpoint.status }}"

    - name: Show Healthchecks systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Healthchecks systemd: {{ healthchecks_service.status.ActiveState }}"
          - "Healthchecks HTTP: {{ healthchecks_endpoint.status }}"
